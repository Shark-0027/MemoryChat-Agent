# =============================================================================
# MemoryChat-Agent - Docker Compose
# =============================================================================
# Start the full application with a single command:
#     docker compose up
# =============================================================================

services:
  memory-chat-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: memory-chat-agent:latest
    container_name: memory-chat-agent
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8501}:8501"
    env_file:
      - .env
    volumes:
      # Persist the ChromaDB vector store across container restarts.
      - memory-data:/app/data
      # Mount .env so config changes do not require a rebuild.
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  memory-data:
    driver: local
